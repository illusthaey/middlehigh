<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>고등학교 진학 지망 조사 폼 (테스트)</title>
<link href="/static/style.css?v=20260413-1" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  /* 이 페이지에만 쓰이는 고유 스타일. 공통은 style.css에 위임. */
  .survey-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .survey-tabs .chip{cursor:pointer;border:1px solid #d1d5db;background:#fff;padding:8px 14px;border-radius:999px;font-weight:700;font-size:.95rem;color:#111}
  .survey-tabs .chip.is-active{background:#111;color:#fff;border-color:#111}
  .notice-warn{background:#fffaeb;color:#7c2d12;border:1px solid #fedf89;padding:12px 14px;border-radius:12px;margin:0 0 16px;font-weight:600}
  .notice-ok{background:#ecfdf3;color:#166534;border:1px solid #abefc6;padding:12px 14px;border-radius:12px;font-weight:600}
  .form-grid-3{display:grid;grid-template-columns:repeat(3, minmax(0,1fr));gap:10px}
  .field{display:flex;flex-direction:column;gap:4px;margin:12px 0}
  .field label{font-size:.98rem;font-weight:700;color:#111;margin:0}
  .error-box{color:#b42318;font-size:.95rem;margin:10px 0 0;min-height:1.2em;font-weight:600}
  #drop-zone{border:2px dashed #d1d5db;border-radius:14px;padding:36px 20px;text-align:center;background:#fafbfc;transition:all .15s}
  #drop-zone.dragging{border-color:#111;background:#eef2ff}
  #drop-zone input[type=file]{display:none}
  #drop-zone p{margin:0 0 10px}
  .file-list{margin-top:14px;font-size:.95rem;color:#555;text-align:left}
  .file-list div{padding:4px 0}
  .preview-wrap{width:100%;overflow:auto;max-height:420px;margin-top:8px;border:1px solid #e5e7eb;border-radius:10px}
  .preview-wrap table{width:100%;border-collapse:collapse;font-size:.92rem}
  .preview-wrap th,.preview-wrap td{border:1px solid #e5e7eb;padding:6px 8px;text-align:left;white-space:nowrap}
  .preview-wrap th{background:#f9fafb;position:sticky;top:0;z-index:1;font-weight:700}
  .btn-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
  @media print{
    .site-header,.survey-tabs,.btn,.notice-warn,#drop-zone{display:none !important}
    body{background:#fff}
    .section{border:none;box-shadow:none;padding:0}
  }
</style>
</head>
<body class="survey-page">

<header class="site-header">
  <div class="shell">
    <h1>고교 진학 지망 조사</h1>
    <p class="sub">서버에 개인정보를 저장하지 않는 폼 · 학생 제출 후 담임에게 엑셀로 전달</p>
    <div class="survey-tabs" role="tablist">
      <button type="button" class="chip is-active" data-view="student" role="tab" aria-selected="true">학생용 작성</button>
      <button type="button" class="chip" data-view="teacher" role="tab" aria-selected="false">교사용 집계</button>
    </div>
  </div>
</header>

<main class="page-main page-main--compact">

  <!-- 학생용 -->
  <section id="student-view" class="section">
    <div class="notice-warn">
      <b>제약 조건</b> — 본 사이트 서버에는 개인정보가 저장되지 않습니다.<br>
      작성 후 <b>엑셀(.xlsx)</b> 파일을 다운로드해 담임 선생님께 제출해 주세요.
    </div>
    <form id="survey-form" autocomplete="off" novalidate>
      <div class="field">
        <label for="school">재학 중인 중학교</label>
        <input id="school" name="school" type="text" required maxlength="40" placeholder="예: OO중학교">
      </div>
      <div class="form-grid-3">
        <div class="field">
          <label for="grade">학년 (기본 3학년)</label>
          <select id="grade" name="grade" required>
            <option value="">선택</option><option>1</option><option>2</option><option selected>3</option>
          </select>
        </div>
        <div class="field">
          <label for="classNo">반</label>
          <input id="classNo" name="classNo" type="number" min="1" max="30" required>
        </div>
        <div class="field">
          <label for="studentNo">번호</label>
          <input id="studentNo" name="studentNo" type="number" min="1" max="50" required>
        </div>
      </div>
      <div class="field">
        <label for="name">성명</label>
        <input id="name" name="name" type="text" required maxlength="20">
      </div>
      <div class="field">
        <label for="birth">생년월일</label>
        <input id="birth" name="birth" type="date" required>
      </div>
      <div class="field">
        <label for="choice1">1지망 고등학교</label>
        <input id="choice1" name="choice1" type="text" required maxlength="40">
      </div>
      <div class="field">
        <label for="choice2">2지망 고등학교</label>
        <input id="choice2" name="choice2" type="text" required maxlength="40">
      </div>
      <div id="error-box" class="error-box" role="alert" aria-live="polite"></div>
      <div class="btn-row">
        <button type="button" class="btn primary" id="btn-xlsx">엑셀(.xlsx) 다운로드</button>
        <button type="button" class="btn ghost" id="btn-print">인쇄용 보기</button>
        <button type="button" class="btn ghost" id="btn-reset">초기화</button>
      </div>
    </form>
  </section>

  <section class="section">
    <div class="notice-ok">
      💡 작성 중인 내용은 <b>이 기기의 브라우저</b>에만 임시 저장됩니다.
      공용 기기라면 제출 직후 <b>초기화</b>를 눌러 지워 주세요.
    </div>
  </section>

  <!-- 교사용 -->
  <section id="teacher-view" class="section" hidden>
    <div class="notice-warn">
      ⚠ 교사용 집계 도구입니다. 파일은 <b>선생님의 브라우저 안에서만</b> 처리되며 어디에도 전송되지 않습니다.
    </div>
    <div id="drop-zone">
      <p>학생들이 제출한 <b>.xlsx</b> 파일을 여기에 드래그하거나</p>
      <label for="file-input" class="btn primary">파일 선택</label>
      <input type="file" id="file-input" multiple accept=".xlsx,.xls">
      <div class="file-list" id="file-list"></div>
    </div>
    <div id="preview-card" hidden>
      <h3 style="margin:18px 0 6px">집계 미리보기 (<span id="count">0</span>건)</h3>
      <div class="preview-wrap"><table id="preview-table"></table></div>
      <div class="btn-row">
        <button type="button" class="btn primary" id="btn-master">통합본 .xlsx 다운로드</button>
        <button type="button" class="btn ghost" id="btn-clear">목록 비우기</button>
      </div>
    </div>
  </section>

</main>

<script>
// ===== 유틸 =====
function sanitizeCell(v){
  if(v===null||v===undefined) return '';
  const s=String(v);
  if(/^[=+\-@\t\r]/.test(s)) return "'"+s;
  return s;
}
function safeFileSeg(v){ return String(v||'').replace(/[^\w가-힣]/g,'_').slice(0,30); }
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const SCHEMA = ['제출시각','중학교','학년','반','번호','성명','생년월일','1지망 고교','2지망 고교','확인코드'];

async function shortHash(str){
  const buf = new TextEncoder().encode(str);
  const h = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(h)).slice(0,2).map(b=>b.toString(16).padStart(2,'0')).join('').toUpperCase();
}

// ===== 탭 =====
$$('.survey-tabs .chip').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    $$('.survey-tabs .chip').forEach(b=>{
      b.classList.remove('is-active');
      b.setAttribute('aria-selected','false');
    });
    btn.classList.add('is-active');
    btn.setAttribute('aria-selected','true');
    const v=btn.dataset.view;
    $('#student-view').hidden=(v!=='student');
    $('#teacher-view').hidden=(v!=='teacher');
  });
});

// ===== 임시저장 =====
const DRAFT_KEY='gojigi.draft.v1';
function loadDraft(){
  try{
    const raw=localStorage.getItem(DRAFT_KEY); if(!raw) return;
    const data=JSON.parse(raw);
    Object.entries(data).forEach(([k,v])=>{
      const el=$('#survey-form [name="'+k+'"]'); if(el) el.value=v;
    });
  }catch(e){}
}
function saveDraft(){
  const f=new FormData($('#survey-form')); const obj={};
  for(const [k,v] of f.entries()) obj[k]=v;
  localStorage.setItem(DRAFT_KEY, JSON.stringify(obj));
}
$('#survey-form').addEventListener('input', saveDraft);
loadDraft();

// ===== 검증 =====
function collectAndValidate(){
  const f=$('#survey-form'); const data={}; const errors=[];
  ['school','grade','classNo','studentNo','name','birth','choice1','choice2'].forEach(k=>{
    const v=(f[k].value||'').trim(); data[k]=v;
    if(!v) errors.push(labelOf(k)+' 을(를) 입력하세요.');
  });
  if(data.name && data.name.length<2) errors.push('성명은 2자 이상이어야 합니다.');
  if(data.choice1 && data.choice1===data.choice2) errors.push('1지망과 2지망이 같을 수 없습니다.');
  return {data, errors};
}
function labelOf(k){
  return {school:'중학교',grade:'학년',classNo:'반',studentNo:'번호',name:'성명',birth:'생년월일',choice1:'1지망',choice2:'2지망'}[k];
}

// ===== 학생 엑셀 내보내기 =====
$('#btn-xlsx').addEventListener('click', async ()=>{
  const {data, errors}=collectAndValidate();
  const box=$('#error-box'); box.textContent='';
  if(errors.length){ box.innerHTML=errors.join('<br>'); return; }
  const ts=new Date().toISOString().slice(0,19).replace('T',' ');
  const payload=[ts,data.school,data.grade,data.classNo,data.studentNo,data.name,data.birth,data.choice1,data.choice2].map(sanitizeCell);
  const code=await shortHash(payload.join('|'));
  payload.push(code);
  const ws=XLSX.utils.aoa_to_sheet([SCHEMA, payload]);
  ws['!cols']=SCHEMA.map(()=>({wch:14}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '고교지망');
  const fname = `고교지망_${safeFileSeg(data.school)}_${safeFileSeg(data.grade)}-${safeFileSeg(data.classNo)}-${safeFileSeg(data.studentNo)}_${safeFileSeg(data.name)}.xlsx`;
  XLSX.writeFile(wb, fname);
});

$('#btn-print').addEventListener('click', ()=>window.print());
$('#btn-reset').addEventListener('click', ()=>{
  if(!confirm('입력한 내용을 모두 지울까요? (브라우저 임시저장도 삭제됩니다)')) return;
  $('#survey-form').reset(); localStorage.removeItem(DRAFT_KEY); $('#error-box').textContent='';
});

// ===== 교사 집계 =====
const dropZone=$('#drop-zone'); const fileInput=$('#file-input'); const fileList=$('#file-list');
let aggregated=[];

['dragenter','dragover'].forEach(ev=>{
  dropZone.addEventListener(ev, e=>{ e.preventDefault(); dropZone.classList.add('dragging'); });
});
['dragleave','drop'].forEach(ev=>{
  dropZone.addEventListener(ev, e=>{ e.preventDefault(); dropZone.classList.remove('dragging'); });
});
dropZone.addEventListener('drop', e=>handleFiles(e.dataTransfer.files));
fileInput.addEventListener('change', e=>handleFiles(e.target.files));

async function handleFiles(files){
  const arr=Array.from(files).filter(f=>/\.xlsx?$/i.test(f.name));
  for(const file of arr){
    try{
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1, defval:''});
      if(!rows[0] || rows[0].join('|')!==SCHEMA.join('|')){
        appendFileLog(file.name,'⚠ 스키마 불일치 — 건너뜀'); continue;
      }
      for(let i=1;i<rows.length;i++){
        const r=rows[i]; if(!r[5]) continue;
        const payload=r.slice(0,9).map(sanitizeCell);
        const expected=await shortHash(payload.join('|'));
        const ok=(String(r[9]||'').toUpperCase()===expected);
        aggregated.push({row:r, ok, src:file.name});
      }
      appendFileLog(file.name,'✓ 반영됨');
    }catch(err){ appendFileLog(file.name,'✗ 오류: '+err.message); }
  }
  renderPreview();
}
function appendFileLog(name,msg){
  const div=document.createElement('div');
  div.textContent=`• ${name} — ${msg}`;
  fileList.appendChild(div);
}
function renderPreview(){
  if(!aggregated.length) return;
  $('#preview-card').hidden=false; $('#count').textContent=aggregated.length;
  const tbl=$('#preview-table'); tbl.innerHTML='';
  const thead=document.createElement('thead'); const thr=document.createElement('tr');
  [...SCHEMA,'무결성','출처파일'].forEach(h=>{
    const th=document.createElement('th'); th.textContent=h; thr.appendChild(th);
  });
  thead.appendChild(thr); tbl.appendChild(thead);
  const tbody=document.createElement('tbody');
  aggregated.forEach(rec=>{
    const tr=document.createElement('tr');
    rec.row.forEach(cell=>{ const td=document.createElement('td'); td.textContent=cell; tr.appendChild(td); });
    const td1=document.createElement('td');
    td1.textContent=rec.ok?'✓':'⚠ 변조의심';
    td1.style.color=rec.ok?'#067647':'#b42318';
    tr.appendChild(td1);
    const td2=document.createElement('td'); td2.textContent=rec.src; tr.appendChild(td2);
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
}
$('#btn-master').addEventListener('click', ()=>{
  if(!aggregated.length) return;
  const header=[...SCHEMA,'무결성','출처파일'];
  const body=aggregated.map(rec=>[...rec.row, rec.ok?'OK':'TAMPERED', rec.src]);
  const ws=XLSX.utils.aoa_to_sheet([header, ...body]);
  ws['!cols']=header.map(()=>({wch:14}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '통합본');
  XLSX.writeFile(wb, `고교지망_통합_${new Date().toISOString().slice(0,10)}.xlsx`);
});
$('#btn-clear').addEventListener('click', ()=>{
  aggregated=[]; fileList.innerHTML=''; $('#preview-table').innerHTML=''; $('#preview-card').hidden=true;
});
</script>
</body>
</html>
