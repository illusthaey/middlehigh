<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>고교 지망 조사</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --ink:#1a1a1a; --sub:#606770;
    --line:#dcdfe3; --accent:#1a56db; --accent-dark:#1340a0;
    --warn:#b54708; --warn-bg:#fffaeb; --ok:#067647; --ok-bg:#ecfdf3;
  }
  *{box-sizing:border-box}
  html,body{
    margin:0;padding:0;
    font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Apple SD Gothic Neo','Segoe UI',Roboto,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.55;
  }
  header{background:var(--card);border-bottom:1px solid var(--line);padding:16px 20px;position:sticky;top:0;z-index:10}
  header h1{margin:0 0 8px;font-size:18px}
  nav{display:flex;gap:8px}
  nav button{background:none;border:1px solid var(--line);padding:8px 14px;border-radius:999px;cursor:pointer;font-size:14px;color:var(--ink)}
  nav button.active{background:var(--accent);border-color:var(--accent);color:#fff}
  main{max-width:720px;margin:0 auto;padding:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px;margin-bottom:16px}
  .notice{background:var(--warn-bg);color:var(--warn);border:1px solid #fedf89;padding:12px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}
  .ok-notice{background:var(--ok-bg);color:var(--ok);border:1px solid #abefc6;padding:12px 14px;border-radius:8px;font-size:13px}
  label{display:block;font-size:14px;margin:14px 0 6px;font-weight:600}
  input,select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:15px;background:#fff;color:var(--ink)}
  input:focus,select:focus{outline:2px solid var(--accent);border-color:var(--accent)}
  .row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .btn{display:inline-block;padding:12px 20px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-right:8px;margin-top:8px}
  .btn:hover{background:var(--accent-dark)}
  .btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .error{color:#b42318;font-size:13px;margin-top:4px}
  #drop-zone{border:2px dashed var(--line);border-radius:12px;padding:40px 20px;text-align:center;background:#fafbfc;transition:all .15s}
  #drop-zone.dragging{border-color:var(--accent);background:#eff4ff}
  #drop-zone input[type=file]{display:none}
  #drop-zone label{display:inline-block;padding:10px 16px;background:var(--accent);color:#fff;border-radius:8px;cursor:pointer;margin:0;font-weight:600}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{border:1px solid var(--line);padding:6px 8px;text-align:left}
  th{background:#f3f4f6}
  .file-list{margin-top:12px;font-size:13px;color:var(--sub)}
  .file-list div{padding:4px 0}
  @media print{
    header,nav,.btn,.notice,#drop-zone{display:none!important}
    body{background:#fff}
    .card{border:none;padding:0}
  }
</style>
</head>
<body>
<header>
  <h1>고교 지망 조사 폼</h1>
  <nav>
    <button data-view="student" class="active">학생용 작성</button>
    <button data-view="teacher">교사용 집계</button>
  </nav>
</header>
<main>

<section id="student-view">
  <div class="notice">
    ⚠ 개인정보는 이 웹사이트 서버에 저장되지 않습니다. 작성 후 <b>엑셀 파일로 다운로드</b>하여 담임 선생님께 제출해 주세요.
  </div>
  <div class="card">
    <form id="survey-form" autocomplete="off" novalidate>
      <label for="school">현재 재학 중학교</label>
      <input id="school" name="school" type="text" required maxlength="40">
      <div class="row">
        <div>
          <label for="grade">학년</label>
          <select id="grade" name="grade" required>
            <option value="">선택</option><option>1</option><option>2</option><option selected>3</option>
          </select>
        </div>
        <div>
          <label for="classNo">반</label>
          <input id="classNo" name="classNo" type="number" min="1" max="30" required>
        </div>
        <div>
          <label for="studentNo">번호</label>
          <input id="studentNo" name="studentNo" type="number" min="1" max="50" required>
        </div>
      </div>
      <label for="name">성명</label>
      <input id="name" name="name" type="text" required maxlength="20">
      <label for="birth">생년월일</label>
      <input id="birth" name="birth" type="date" required>
      <label for="choice1">1지망 고등학교</label>
      <input id="choice1" name="choice1" type="text" required maxlength="40">
      <label for="choice2">2지망 고등학교</label>
      <input id="choice2" name="choice2" type="text" required maxlength="40">
      <div id="error-box"></div>
      <div style="margin-top:16px">
        <button type="button" class="btn" id="btn-xlsx">엑셀(.xlsx) 다운로드</button>
        <button type="button" class="btn secondary" id="btn-print">인쇄용 보기</button>
        <button type="button" class="btn secondary" id="btn-reset">초기화</button>
      </div>
    </form>
  </div>
  <div class="card">
    <div class="ok-notice">
      💡 작성 중인 내용은 브라우저에만 임시 저장됩니다. 공용 기기라면 제출 후 <b>초기화</b>를 눌러 지워 주세요.
    </div>
  </div>
</section>

<section id="teacher-view" hidden>
  <div class="notice">
    ⚠ 교사용 집계 도구입니다. 파일은 <b>선생님의 브라우저 안에서만</b> 처리되며 어디에도 전송되지 않습니다.
  </div>
  <div class="card">
    <div id="drop-zone">
      <p style="margin:0 0 12px">학생들이 제출한 .xlsx 파일을 여기에 <b>드래그</b>하거나</p>
      <label for="file-input">파일 선택</label>
      <input type="file" id="file-input" multiple accept=".xlsx,.xls">
      <div class="file-list" id="file-list"></div>
    </div>
  </div>
  <div class="card" id="preview-card" hidden>
    <h3 style="margin-top:0">집계 미리보기 (<span id="count">0</span>건)</h3>
    <div style="overflow:auto;max-height:400px">
      <table id="preview-table"></table>
    </div>
    <div style="margin-top:12px">
      <button type="button" class="btn" id="btn-master">통합본 .xlsx 다운로드</button>
      <button type="button" class="btn secondary" id="btn-clear">목록 비우기</button>
    </div>
  </div>
</section>

</main>

<script>
// ===== 유틸 =====
// CSV 인젝션 방어: =,+,-,@,탭,CR로 시작하는 값은 작은따옴표 prefix
function sanitizeCell(v){
  if(v===null||v===undefined) return '';
  const s=String(v);
  if(/^[=+\-@\t\r]/.test(s)) return "'"+s;
  return s;
}
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const SCHEMA = ['제출시각','중학교','학년','반','번호','성명','생년월일','1지망 고교','2지망 고교','확인코드'];

// SHA-256 앞 4자리 — 탬퍼링 감지용 체크섬
async function shortHash(str){
  const buf = new TextEncoder().encode(str);
  const h = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(h)).slice(0,2).map(b=>b.toString(16).padStart(2,'0')).join('').toUpperCase();
}

// ===== 뷰 전환 =====
$$('nav button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    $$('nav button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const v=btn.dataset.view;
    $('#student-view').hidden=(v!=='student');
    $('#teacher-view').hidden=(v!=='teacher');
  });
});

// ===== 임시저장 =====
const DRAFT_KEY='gojigi.draft.v1';
function loadDraft(){
  try{
    const raw=localStorage.getItem(DRAFT_KEY); if(!raw) return;
    const data=JSON.parse(raw);
    Object.entries(data).forEach(([k,v])=>{
      const el=$('#survey-form [name="'+k+'"]'); if(el) el.value=v;
    });
  }catch(e){}
}
function saveDraft(){
  const f=new FormData($('#survey-form')); const obj={};
  for(const [k,v] of f.entries()) obj[k]=v;
  localStorage.setItem(DRAFT_KEY, JSON.stringify(obj));
}
$('#survey-form').addEventListener('input', saveDraft);
loadDraft();

// ===== 검증 =====
function collectAndValidate(){
  const f=$('#survey-form'); const data={}; const errors=[];
  ['school','grade','classNo','studentNo','name','birth','choice1','choice2'].forEach(k=>{
    const v=(f[k].value||'').trim(); data[k]=v;
    if(!v) errors.push(labelOf(k)+' 을(를) 입력하세요.');
  });
  if(data.name && data.name.length<2) errors.push('성명은 2자 이상이어야 합니다.');
  if(data.choice1 && data.choice1===data.choice2) errors.push('1지망과 2지망이 같을 수 없습니다.');
  return {data, errors};
}
function labelOf(k){
  return {school:'중학교',grade:'학년',classNo:'반',studentNo:'번호',name:'성명',birth:'생년월일',choice1:'1지망',choice2:'2지망'}[k];
}

// ===== 학생: 엑셀 내보내기 =====
$('#btn-xlsx').addEventListener('click', async ()=>{
  const {data, errors}=collectAndValidate();
  const box=$('#error-box'); box.innerHTML='';
  if(errors.length){ box.innerHTML='<div class="error">'+errors.join('<br>')+'</div>'; return; }
  const ts=new Date().toISOString().slice(0,19).replace('T',' ');
  const payload=[ts,data.school,data.grade,data.classNo,data.studentNo,data.name,data.birth,data.choice1,data.choice2].map(sanitizeCell);
  const code=await shortHash(payload.join('|'));
  payload.push(code);
  const ws=XLSX.utils.aoa_to_sheet([SCHEMA, payload]);
  ws['!cols']=SCHEMA.map(()=>({wch:14}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '고교지망');
  const safe=data.name.replace(/[^\w가-힣]/g,'_');
  XLSX.writeFile(wb, `고교지망_${data.school}_${data.grade}-${data.classNo}-${data.studentNo}_${safe}.xlsx`);
});

$('#btn-print').addEventListener('click', ()=>window.print());
$('#btn-reset').addEventListener('click', ()=>{
  if(!confirm('입력한 내용을 모두 지울까요? (브라우저 임시저장도 삭제됩니다)')) return;
  $('#survey-form').reset(); localStorage.removeItem(DRAFT_KEY); $('#error-box').innerHTML='';
});

// ===== 교사: 드래그앤드롭 집계 =====
const dropZone=$('#drop-zone'); const fileInput=$('#file-input'); const fileList=$('#file-list');
let aggregated=[];

['dragenter','dragover'].forEach(ev=>{
  dropZone.addEventListener(ev, e=>{ e.preventDefault(); dropZone.classList.add('dragging'); });
});
['dragleave','drop'].forEach(ev=>{
  dropZone.addEventListener(ev, e=>{ e.preventDefault(); dropZone.classList.remove('dragging'); });
});
dropZone.addEventListener('drop', e=>handleFiles(e.dataTransfer.files));
fileInput.addEventListener('change', e=>handleFiles(e.target.files));

async function handleFiles(files){
  const arr=Array.from(files).filter(f=>/\.xlsx?$/i.test(f.name));
  for(const file of arr){
    try{
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1, defval:''});
      if(!rows[0] || rows[0].join('|')!==SCHEMA.join('|')){
        appendFileLog(file.name,'⚠ 스키마 불일치 — 건너뜀'); continue;
      }
      for(let i=1;i<rows.length;i++){
        const r=rows[i]; if(!r[5]) continue;
        const payload=r.slice(0,9).map(sanitizeCell);
        const expected=await shortHash(payload.join('|'));
        const ok=(String(r[9]||'').toUpperCase()===expected);
        aggregated.push({row:r, ok, src:file.name});
      }
      appendFileLog(file.name,'✓ 반영됨');
    }catch(err){ appendFileLog(file.name,'✗ 오류: '+err.message); }
  }
  renderPreview();
}
function appendFileLog(name,msg){
  const div=document.createElement('div');
  div.textContent=`• ${name} — ${msg}`;
  fileList.appendChild(div);
}
function renderPreview(){
  if(!aggregated.length) return;
  $('#preview-card').hidden=false; $('#count').textContent=aggregated.length;
  const tbl=$('#preview-table'); tbl.innerHTML='';
  const thead=document.createElement('thead'); const thr=document.createElement('tr');
  [...SCHEMA,'무결성','출처파일'].forEach(h=>{
    const th=document.createElement('th'); th.textContent=h; thr.appendChild(th);
  });
  thead.appendChild(thr); tbl.appendChild(thead);
  const tbody=document.createElement('tbody');
  aggregated.forEach(rec=>{
    const tr=document.createElement('tr');
    rec.row.forEach(cell=>{ const td=document.createElement('td'); td.textContent=cell; tr.appendChild(td); });
    const td1=document.createElement('td');
    td1.textContent=rec.ok?'✓':'⚠ 변조의심';
    td1.style.color=rec.ok?'#067647':'#b42318';
    tr.appendChild(td1);
    const td2=document.createElement('td'); td2.textContent=rec.src; tr.appendChild(td2);
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
}
$('#btn-master').addEventListener('click', ()=>{
  if(!aggregated.length) return;
  const header=[...SCHEMA,'무결성','출처파일'];
  const body=aggregated.map(rec=>[...rec.row, rec.ok?'OK':'TAMPERED', rec.src]);
  const ws=XLSX.utils.aoa_to_sheet([header, ...body]);
  ws['!cols']=header.map(()=>({wch:14}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '통합본');
  XLSX.writeFile(wb, `고교지망_통합_${new Date().toISOString().slice(0,10)}.xlsx`);
});
$('#btn-clear').addEventListener('click', ()=>{
  aggregated=[]; fileList.innerHTML=''; $('#preview-table').innerHTML=''; $('#preview-card').hidden=true;
});
</script>
</body>
</html>
